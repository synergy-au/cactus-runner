name: CI
on:
  push:
    branches: [main, csipaus.org/ns/v1.2, csipaus.org/ns/v1.3, csipaus.org/ns/v1.3-beta/storage]
  pull_request:
    branches: [main, csipaus.org/ns/v1.2, csipaus.org/ns/v1.3, csipaus.org/ns/v1.3-beta/storage]
  workflow_dispatch:

jobs:
  linting:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        pyver: ["3.12", "3.13", "3.14"]
        
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.pyver }}
      - name: Install linters
        run: pip install .[dev,test]

      - name: Lint (ruff)
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Typing (ty)
        run: ty check .
      - name: Security scan (bandit)
        run: bandit -c pyproject.toml -r src/

  pytest_py312:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install .[test]

      - name: Run Pytest
        run: |
          export DATABASE_URL="postgresql+asyncpg://fake:fake@localhost:5432/fake"
          pytest -n auto --junit-xml=.test_report.xml
      - name: Upload Results
        uses: test-summary/action@v1
        with:
          paths: .test_report.xml
        if: always()
